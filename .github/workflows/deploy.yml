name: Cloud Run デプロイ

on:
  push:
    branches:
      - master

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Docker 認証設定
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Docker イメージをビルドして push
        run: |
          IMAGE="asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stargazing-bot/app:latest"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Cloud Run へデプロイ
        run: |
          gcloud run deploy stargazing-bot \
            --image "asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stargazing-bot/app:latest" \
            --region asia-northeast1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "LINE_CHANNEL_ACCESS_TOKEN=${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }},LINE_CHANNEL_SECRET=${{ secrets.LINE_CHANNEL_SECRET }},LINE_BOT_USER_ID=${{ secrets.LINE_BOT_USER_ID }},HOSHIMIRU_API_TOKEN=${{ secrets.HOSHIMIRU_API_TOKEN }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}"
